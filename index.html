<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerenciamento de Contatos</title>

    <link rel="stylesheet" href="contato.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1 style="padding: 15px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-journal-bookmark-fill" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M6 1h6v7a.5.5 0 0 1-.757.429L9 7.083 6.757 8.43A.5.5 0 0 1 6 8z"/>
            <path d="M3 0h10a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2v-1h1v1a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v1H1V2a2 2 0 0 1 2-2"/>
            <path d="M1 5v-.5a.5.5 0 0 1 1 0V5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1zm0 3v-.5a.5.5 0 0 1 1 0V8h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1zm0 3v-.5a.5.5 0 0 1 1 0v.5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1z"/>
        </svg> Agenda de Contatos</h1>

    <div style="text-align: end;">
        <button
            id="btnNovo"
            class="btn btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#modalContato">
            Novo Contato
        </button>
    </div>

    <div class="input-group mb-3" style="width: 600px;">
        <input type="text" class="form-control" placeholder="Digite o nome do contato" aria-label="Recipient's username" aria-describedby="basic-addon2" id="buscaNome">
        <div class="input-group-append">
            <button class="btn btn-outline-secondary" type="button" id="btnBuscar">Buscar</button>
        </div>
    </div>

    <hr>

    <table class="table table-hover table-striped" width="100%">
        <thead>
            <tr>
                <th scope="col">ID</th>
                <th scope="col">Nome</th>
                <th scope="col">Telefone</th>
                <th scope="col">Email</th>
                <th scope="col">Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaContatos"></tbody>
    </table>

    <div class="modal fade" id="modalContato" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Novo Contato</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"> </button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="contatoId">
                    <div class="mb-3">
                        <label class="form-label">Nome</label>
                        <input type="text" id="nome" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Telefone</label>
                        <input type="text" id="telefone" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="btnCancelar" type="button" class="btn btn-secondary" data-bs-dismiss="modal"> Cancelar </button>
                    <button id="btnSalvar" type="button" class="btn btn-success" onclick="salvarContato()"> Salvar </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditarContato" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Contato</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"> </button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="idContatoInputEdit">
                    <div class="mb-3">
                        <label class="form-label">Nome</label>
                        <input type="text" id="nomeContatoInputEdit" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Telefone</label>
                        <input type="text" id="telefoneContatoInputEdit" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="emailContatoInputEdit" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="btnCancelar" type="button" class="btn btn-secondary" data-bs-dismiss="modal"> Cancelar </button>
                    <button id="btnEditar" type="button" class="btn btn-success" onclick="atualizarContato()"> Salvar </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalExcluirContato" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title">Excluir Contato</h3>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"> </button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="idContatoInputExclusao">
                    <b>Tem certeza que gostaria de excluir o contato? <br><br> ESSA AÇÃO NÃO PODERA SER DESFEITA***</b>
                </div>
                <div class="modal-footer">
                    <button id="btnCancelar" type="button" class="btn btn-secondary" data-bs-dismiss="modal"> Cancelar </button>
                    <button id="btnExcluir" type="button" class="btn btn-success" onclick="excluirContato()"> Excluir </button>
                </div>
            </div>
        </div>
    </div>

    <script src="contato.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
